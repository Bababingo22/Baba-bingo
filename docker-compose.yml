version: '3.8'

services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: bingo_db
      POSTGRES_USER: bingo_user
      POSTGRES_PASSWORD: bingo_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    # This automatically migrates your 200 cards, creates a default Admin user, and starts the server
    command: bash -c "python manage.py migrate && DJANGO_SUPERUSER_PASSWORD=admin python manage.py createsuperuser --noinput --username admin --email admin@admin.com || true && daphne -b 0.0.0.0 -p 8000 vlad_bingo.asgi:application"
    environment:
      - DATABASE_URL=postgres://bingo_user:bingo_password@db:5432/bingo_db
      - REDIS_URL=redis://redis:6379
      - DEBUG=True
      - SECRET_KEY=offline_super_secret_key_vlad_bingo
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
